<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Client Dashboard</title>

    <!-- external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>Client Dashboard</h1>

    <div class="label">Enter your request:</div>
    <input type="text" id="userInput" placeholder="Type something...">

    <div class="label">Upload file:</div>
    <input type="file" id="fileInput">

    <button onclick="handleSubmit()">Submit</button>

    <div class="output" id="outputBox">
        Results will appear here...
    </div>
</div>

<script>
async function handleSubmit() {
    const text = document.getElementById("userInput").value;
    const file = document.getElementById("fileInput").files[0];

    const outputBox = document.getElementById("outputBox");

    if (!text && !file) {
        outputBox.innerHTML = "⚠️ Please enter text or upload a file.";
        return;
    }

    const formData = new FormData();

    // backend expects "question"
    formData.append("question", text);

    // backend expects "file"
    if (file) {
        formData.append("file", file);
    }

    outputBox.innerHTML = "⏳ Processing...";

    try {
        const res = await fetch("https://1552-34-138-105-186.ngrok-free.app", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        outputBox.innerHTML =
            "<b>Answer:</b><br><br>" + data.answer;

    } catch (err) {
        outputBox.innerHTML =
            "❌ Error connecting to server";
    }
}
</script>

</body>
</html>
